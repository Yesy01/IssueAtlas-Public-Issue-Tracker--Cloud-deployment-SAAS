# Rate limiting zones
limit_req_zone $binary_remote_addr zone=authzone:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=generalzone:10m rate=100r/s;

# HTTP server - redirect to HTTPS
server {
  listen 80;
  server_name _;
  
  # Redirect all HTTP traffic to HTTPS
  return 301 https://$host$request_uri;
}

# HTTPS server
server {
  listen 443 ssl http2;
  server_name _;
  
  # SSL certificate paths (update these paths based on your setup)
  # For Let's Encrypt: /etc/letsencrypt/live/your-domain/fullchain.pem
  # For self-signed: /etc/nginx/ssl/server.crt
  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  
  # SSL configuration - modern security settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers off;
  
  # SSL session caching
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  
  # OCSP stapling (requires ssl_trusted_certificate)
  ssl_stapling on;
  ssl_stapling_verify on;
  
  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  
  client_max_body_size 10m;

  # API proxy with rate limiting
  location /api/ {
    limit_req zone=generalzone burst=20 nodelay;
    
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Auth endpoints with stricter rate limiting
  location ~ ^/api/auth/ {
    limit_req zone=authzone burst=10 nodelay;
    
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend static files
  location / {
    root /var/www/app;
    try_files $uri /index.html;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
