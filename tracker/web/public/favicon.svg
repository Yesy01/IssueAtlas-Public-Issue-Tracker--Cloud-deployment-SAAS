<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IssueAtlas Icon</title>
  <desc id="desc">Map pin over a grid</desc>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#F3F4F6"></rect>

  <!-- Grid / map tiles -->
  <g transform="translate(12,18)" stroke="#CBD5F5" stroke-width="1.5">
    <rect x="0" y="0" width="14" height="10" fill="#FFFFFF"></rect>
    <rect x="16" y="0" width="14" height="10" fill="#FFFFFF"></rect>
    <rect x="32" y="0" width="14" height="10" fill="#FFFFFF"></rect>

    <rect x="0" y="12" width="14" height="10" fill="#FFFFFF"></rect>
    <rect x="16" y="12" width="14" height="10" fill="#FFFFFF"></rect>
    <rect x="32" y="12" width="14" height="10" fill="#FFFFFF"></rect>
  </g>

  <!-- Map pin -->
  <g transform="translate(32,24)">
    <path d="M0 -2
             C -6 -2 -10 2 -10 8
             C -10 14 -4 21 0 25
             C 4 21 10 14 10 8
             C 10 2 6 -2 0 -2 Z" fill="#2563EB"></path>
    <circle cx="0" cy="6" r="4" fill="#FFFFFF"></circle>
  </g>
</svg>
